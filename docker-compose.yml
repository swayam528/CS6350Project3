version: "3.8"

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  pipeline:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  es_data:

# ── Services ───────────────────────────────────────────────────────────────────
services:

  # --------------------------------------------------------------------------
  # ZooKeeper
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: zookeeper
    networks: [pipeline]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Kafka
  #   • PLAINTEXT://localhost:9092  – reachable from the host (producer / Spark)
  #   • PLAINTEXT_INTERNAL://kafka:29092 – reachable from other containers (Logstash)
  # --------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: kafka
    container_name: kafka
    networks: [pipeline]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID:                          1
      KAFKA_ZOOKEEPER_CONNECT:                  "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:     "PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_WSL:PLAINTEXT"
      KAFKA_LISTENERS:                          "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_WSL://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS:               "PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_WSL://${KAFKA_WSL_HOST:-172.24.176.1}:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME:         "PLAINTEXT_INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:   1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:          "true"
      KAFKA_LOG_RETENTION_HOURS:                24
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # --------------------------------------------------------------------------
  # Elasticsearch
  # --------------------------------------------------------------------------
  elasticsearch:
    image: elasticsearch:7.17.20
    hostname: elasticsearch
    container_name: elasticsearch
    networks: [pipeline]
    ports:
      - "9200:9200"
    environment:
      discovery.type:         single-node
      ES_JAVA_OPTS:           "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  # --------------------------------------------------------------------------
  # Logstash  –  reads ner-counts from Kafka, upserts into Elasticsearch
  # --------------------------------------------------------------------------
  logstash:
    image: logstash:7.17.20
    hostname: logstash
    container_name: logstash
    networks: [pipeline]
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro

  # --------------------------------------------------------------------------
  # Kibana
  # --------------------------------------------------------------------------
  kibana:
    image: kibana:7.17.20
    hostname: kibana
    container_name: kibana
    networks: [pipeline]
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 20s
      timeout: 10s
      retries: 15
