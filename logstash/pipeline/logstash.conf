# =============================================================================
# Logstash Pipeline  –  NER Entity Counts
# =============================================================================
# Input : Kafka topic  "ner-counts"
#           Each message value is JSON: {"entity":"…","label":"PERSON","count":42}
#
# Filter: parse JSON, sanitise document ID, add ingest timestamp
#
# Output: Elasticsearch index "ner-entity-counts"
#           document_id = entity_label  (upsert semantics via action=>index)
#           Each trigger from PySpark replaces the document with the latest
#           running count, so the index always reflects the current totals.
# =============================================================================

input {
  kafka {
    bootstrap_servers => "kafka:29092"
    topics            => ["ner-counts"]
    codec             => "json"
    auto_offset_reset => "earliest"
    group_id          => "logstash-ner-consumer"
    # Consume up to 500 records per poll to keep up with burst writes
    max_poll_records  => "500"
  }
}

filter {
  # Drop malformed messages that have no entity field
  if ![entity] or [entity] == "" {
    drop { }
  }

  # Sanitise entity text: replace characters that are illegal in ES document IDs
  mutate {
    # Build a safe document ID: "entity||label"  with spaces → underscores
    gsub => ["entity", "[/\\\\]", "_"]
    add_field => {
      "[@metadata][doc_id]" => "%{entity}_%{label}"
    }
  }

  # Add ingest timestamp so Kibana can show "last updated" if desired
  ruby {
    code => "event.set('ingested_at', Time.now.utc.iso8601)"
  }
}

output {
  elasticsearch {
    hosts           => ["http://elasticsearch:9200"]
    index           => "ner-entity-counts"
    # Fixed document ID per entity+label → later writes overwrite earlier ones,
    # giving the latest running count from PySpark.
    document_id     => "%{[@metadata][doc_id]}"
    action          => "index"
    # Retry on transient ES errors
    retry_on_conflict => 3
  }

  # Mirror output to stdout for debugging (remove in production)
  stdout {
    codec => dots   # print one dot per event to avoid flooding logs
  }
}
